server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/liquirdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  upload-dir: uploads
  ai:
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    openai-api-key: ${OPENAI_API_KEY:}
